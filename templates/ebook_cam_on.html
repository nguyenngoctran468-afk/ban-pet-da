<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cảm Ơn - AI Affiliate Blueprint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #6366f1;
      --color-secondary: #a855f7;
      --color-accent: #f59e0b;
      --color-bg: #0f172a;
      --color-card: #1e293b;
      --color-text: #f8fafc;
      --color-muted: #94a3b8;
      --font-main: 'Inter', sans-serif;
      --font-heading: 'Outfit', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background-color: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .success-card {
      background: var(--color-card);
      width: 100%;
      max-width: 500px;
      padding: 50px;
      border-radius: 32px;
      text-align: center;
      border: 1px solid #4ade80;
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
    }

    .icon { font-size: 5rem; margin-bottom: 20px; }
    h2 { font-family: var(--font-heading); font-size: 2.5rem; color: #4ade80; margin-bottom: 10px; }
    p { color: var(--color-muted); margin-bottom: 30px; }

    .btn-download {
      display: inline-block;
      width: 100%;
      padding: 20px;
      background: #4ade80;
      color: #064e3b;
      text-decoration: none;
      border-radius: 16px;
      font-weight: 900;
      font-size: 1.2rem;
      transition: transform 0.3s;
      box-shadow: 0 10px 25px -5px rgba(74, 222, 128, 0.4);
    }

    .btn-download:hover { transform: translateY(-3px); }

    .email-note { margin-top: 25px; font-size: 0.85rem; color: #64748b; }
  </style>
</head>

<body>
  <div class="success-card">
    <div class="icon">🎉</div>
    <h2>THANH TOÁN THÀNH CÔNG!</h2>
    <p>Cảm ơn bạn! Bản thiết kế <b>AI Affiliate Blueprint</b> đã sẵn sàng để tải về.</p>
    
    <a href="/api/download/ebook?order_id={{ order_id }}&email={{ email }}" class="btn-download">
      🚀 TẢI EBOOK NGAY (.PDF)
    </a>
    
    <div class="email-note">
        Chúng tôi cũng đã gửi link tải vào email <b>{{ email }}</b>.<br>Bạn có thể dùng link đó để tải lại bất cứ lúc nào.
    </div>
  </div>
</body>

</html>
